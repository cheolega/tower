<title>컨트롤 타워</title>
<style>
  :root { color-scheme: light dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: #f9f9f7; color: #0b0b0b;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  @media (prefers-color-scheme: dark) { body { background: #0d0d0d; color: #fff; } }
  .box { width: 100%; max-width: 360px; text-align: center; }
  .lock { font-size: 34px; margin-bottom: 14px; }
  h1 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  p { font-size: 13px; color: #898781; margin-bottom: 18px; }
  input {
    width: 100%; font-size: 16px; padding: 12px 14px; border-radius: 10px;
    border: 1px solid rgba(128,128,128,0.35); background: transparent; color: inherit; outline: none;
  }
  input:focus { border-color: #2a78d6; }
  button {
    width: 100%; margin-top: 10px; font-size: 15px; font-weight: 700; padding: 12px;
    border: none; border-radius: 10px; background: #2a78d6; color: #fff; cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: wait; }
  .err { color: #d03b3b; font-size: 13px; margin-top: 10px; min-height: 18px; }
</style>
</head>

  const btn = document.getElementById("btn"), err = document.getElementById("err");
  btn.disabled = true; err.textContent = "";
  try {
    const pw = document.getElementById("pw").value;
    const keyMat = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
