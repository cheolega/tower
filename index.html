const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
document.getElementById("f").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = document.getElementById("btn"), err = document.getElementById("err");
  btn.disabled = true; err.textContent = "";
  try {
    const pw = document.getElementById("pw").value;
    const keyMat = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: b64(DATA.salt), iterations: DATA.iter, hash: "SHA-256" },
      keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64(DATA.iv) }, key, b64(DATA.ct));
    document.open();
    document.write(new TextDecoder().decode(pt));
    document.close();
  } catch (_) {
    err.textContent = "비밀번호가 올바르지 않습니다";
    btn.disabled = false;
  }
});
