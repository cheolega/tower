<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>C AI Tower</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#0A1D4E">
<meta name="apple-mobile-web-app-title" content="C AI Tower">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root {
    color-scheme: light;
    --page: #f9f9f9; --ink: #000; --inv: #fff; --ph: #909090;
  }
  @media (prefers-color-scheme: dark) {
    :root { color-scheme: dark; --page: #0d0d0d; --ink: #fff; --inv: #000; --ph: #7a7a7a; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Pretendard Variable", Pretendard, system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page); color: var(--ink);
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    padding: 60px 24px 40px;
  }
  h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.01em; text-align: center; }
  .spacer { flex: 1; }
  .panel { width: 100%; max-width: 313px; margin-top: auto; }
  .lbl { font-size: 14px; font-weight: 800; margin: 0 0 8px; }
  .sec { margin-bottom: 22px; }
  button {
    width: 100%; height: 50px; font-size: 14px; font-weight: 800;
    font-family: inherit; background: var(--ink); color: var(--inv);
    border: 1px solid var(--ink); border-radius: 0; cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: wait; }
  button.ghost { background: transparent; color: var(--ink); }
  input {
    width: 100%; height: 50px; font-size: 16px; font-weight: 500; font-family: inherit;
    text-align: center; background: transparent; color: var(--ink);
    border: 1px solid var(--ink); border-radius: 0; outline: none; margin-bottom: 8px;
  }
  input::placeholder { color: var(--ph); font-size: 12px; }
  .err { color: #d03b3b; font-size: 13px; font-weight: 600; margin-top: 14px; min-height: 18px; text-align: center; }
  .note { font-size: 12px; font-weight: 500; color: var(--ph); margin-top: 8px; text-align: center; line-height: 1.5; }
  #bioSec { display: none; }
  #bioOffer { display: none; text-align: center; }
  #bioOffer p { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  #bioOffer button + button { margin-top: 8px; }
</style>
</head>
<body>
  <h1>C AI Tower</h1>
  <div class="spacer"></div>
  <div class="panel">
    <div class="sec" id="bioSec">
      <p class="lbl">Face ID/Touch ID</p>
      <button type="button" id="bioBtn">Login</button>
    </div>
    <form id="f" class="sec">
      <p class="lbl">PW Login</p>
      <input type="password" id="pw" placeholder="비밀번호를 입력하세요." autocomplete="current-password">
      <button type="submit" id="btn">Login</button>
    </form>
    <div class="sec" id="bioOffer">
      <p>이 기기에서 다음부터 Face ID/Touch ID로 열까요?</p>
      <button type="button" id="bioYes">등록하기</button>
      <button type="button" id="bioNo" class="ghost">건너뛰기</button>
    </div>
    <div class="err" id="err"></div>
    <div class="note" id="note"></div>
  </div>

const LS = "tower-bio-v1";
const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function decryptPage(pw) {
  const keyMat = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64d(DATA.salt), iterations: DATA.iter, hash: "SHA-256" },
    keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64d(DATA.iv) }, key, b64d(DATA.ct));
  return new TextDecoder().decode(pt);
}

function render(html) {
  document.open();
  document.write(html);
  document.close();
}

async function prfKeyFromAssertion(credIdB64, prfSaltB64) {
  const assertion = await navigator.credentials.get({
    publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials: [{ type: "public-key", id: b64d(credIdB64), transports: ["internal"] }],
      userVerification: "required",
      extensions: { prf: { eval: { first: b64d(prfSaltB64) } } },
    },
  });
  const prf = assertion.getClientExtensionResults().prf;
  if (!prf || !prf.results || !prf.results.first) throw new Error("no-prf");
  return crypto.subtle.importKey("raw", prf.results.first, "AES-GCM", false, ["encrypt", "decrypt"]);
}

async function bioUnlock() {
  const saved = JSON.parse(localStorage.getItem(LS));
  const key = await prfKeyFromAssertion(saved.cred, saved.prfSalt);
  const pwBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64d(saved.iv) }, key, b64d(saved.ct));
  const pw = new TextDecoder().decode(pwBuf);
  const html = await decryptPage(pw);
  sessionStorage.setItem("tower-s", pw);
  render(html);
}

async function bioRegister(pw) {
  const cred = await navigator.credentials.create({
    publicKey: {
      rp: { name: "C AI Tower" },
      user: {
        id: crypto.getRandomValues(new Uint8Array(16)),
        name: "control-tower",
        displayName: "C AI Tower",
      },
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
      authenticatorSelection: { authenticatorAttachment: "platform", residentKey: "preferred", userVerification: "required" },
      extensions: { prf: {} },
    },
  });
  const credId = b64e(cred.rawId);
  const prfSalt = b64e(crypto.getRandomValues(new Uint8Array(32)));
  const key = await prfKeyFromAssertion(credId, prfSalt);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(pw));
  localStorage.setItem(LS, JSON.stringify({ cred: credId, prfSalt, iv: b64e(iv), ct: b64e(ct) }));
}

const prfSupported = () =>
  window.PublicKeyCredential &&
  PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable;

// 같은 탭 세션 유지 — 새로고침 시 자동 잠금해제 (탭 닫으면 만료)
(async () => {
  const s = sessionStorage.getItem("tower-s");
  if (!s) return;
  try { render(await decryptPage(s)); }
  catch (_) { sessionStorage.removeItem("tower-s"); }
})();

(async () => {
  try {
    if (localStorage.getItem(LS) && prfSupported() &&
        await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()) {
      $("bioSec").style.display = "block";
    }
  } catch (_) {}
})();

$("bioBtn").addEventListener("click", async () => {
  $("bioBtn").disabled = true; $("err").textContent = "";
  try {
    await bioUnlock();
  } catch (_) {
    $("err").textContent = "생체인증에 실패했습니다 — 비밀번호로 열어주세요";
    $("bioBtn").disabled = false;
  }
});

$("f").addEventListener("submit", async e => {
  e.preventDefault();
  $("btn").disabled = true; $("err").textContent = "";
  let html;
  try {
    html = await decryptPage($("pw").value);
    sessionStorage.setItem("tower-s", $("pw").value);
  } catch (_) {
    $("err").textContent = "비밀번호가 올바르지 않습니다";
    $("btn").disabled = false;
    return;
  }
  let offer = false;
  try {
    offer = !localStorage.getItem(LS) && prfSupported() &&
            await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  } catch (_) {}
  if (!offer) { render(html); return; }
  const pw = $("pw").value;
  $("f").style.display = "none"; $("bioSec").style.display = "none"; $("bioOffer").style.display = "block";
  $("bioYes").addEventListener("click", async () => {
    $("bioYes").disabled = true;
    try { await bioRegister(pw); } catch (_) { $("note").textContent = "이 기기/브라우저는 생체인증 등록을 지원하지 않아 건너뜁니다"; }
    render(html);
  });
  $("bioNo").addEventListener("click", () => render(html));
});
</script>
